server:
  port: 8081

spring:
  application:
    name: tenant-service
  data:
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST:localhost}
      port: ${SPRING_DATA_MONGODB_PORT:27017}
      database: ${SPRING_DATA_MONGODB_DATABASE:tenantdb}
      username: ${SPRING_DATA_MONGODB_USERNAME:tenant_user}
      password: ${SPRING_DATA_MONGODB_PASSWORD:tenant_password}
      authentication-database: ${SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE:tenantdb}
  graphql:
    graphiql:
      enabled: true

grpc:
  clients:
    patient-target: ${PATIENT_GRPC_TARGET:localhost:9093}
    physician-target: ${PHYSICIAN_GRPC_TARGET:localhost:9092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
