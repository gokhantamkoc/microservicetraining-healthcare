server:
  port: 8086

spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://notification_user:notification_password@localhost:27018/notificationdb?authSource=notificationdb}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
  graphql:
    graphiql:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

grpc:
  clients:
    patient-target: ${PATIENT_GRPC_TARGET:localhost:9093}
    physician-target: ${PHYSICIAN_GRPC_TARGET:localhost:9092}
