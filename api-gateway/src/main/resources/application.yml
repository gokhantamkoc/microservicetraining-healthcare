server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: tenant-service
              uri: lb://tenant-service
              predicates:
                - Path=/tenants/**,/appointments/**,/announcements/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: tenantService
                    fallbackUri: forward:/fallback
            - id: physician-service
              uri: lb://physician-service
              predicates:
                - Path=/physicians/**
            - id: patient-service
              uri: lb://patient-service
              predicates:
                - Path=/patients/**
            - id: search-service
              uri: lb://search-service
              predicates:
                - Path=/search/**
            - id: checkout-service
              uri: lb://checkout-service
              predicates:
                - Path=/checkout/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/notifications/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
